<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tidal Posting — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f8f8f6;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: 'Jost', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 5px;
    background: #0097b2;
  }

  .corner-tl {
    position: fixed;
    top: 20px; left: 20px;
    width: 30px; height: 30px;
    border-top: 1.5px solid #0097b2;
    border-left: 1.5px solid #0097b2;
  }

  .corner-br {
    position: fixed;
    bottom: 20px; right: 20px;
    width: 30px; height: 30px;
    border-bottom: 1.5px solid #0097b2;
    border-right: 1.5px solid #0097b2;
  }

  .content {
    text-align: center;
    animation: fadeUp 1s ease both;
  }

  .logo {
    margin-bottom: 24px;
  }

  .logo-tidal {
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    color: #0097b2;
    letter-spacing: 4px;
    display: block;
    line-height: 1;
  }

  .logo-posting {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 32px;
    color: #1a1a1a;
    display: block;
    margin-top: -6px;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #0097b2;
    margin: 28px auto;
  }

  .coming-soon {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: #0097b2;
    margin-bottom: 16px;
    font-weight: 400;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    color: #1a1a1a;
    margin-bottom: 40px;
    font-style: italic;
  }

  .email {
    font-size: 13px;
    letter-spacing: 2px;
    color: #999;
    font-weight: 300;
  }

  .email a {
    color: #0097b2;
    text-decoration: none;
    transition: opacity 0.2s;
  }

  .email a:hover { opacity: 0.7; }

  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 5px;
    background: #0097b2;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="bottom-bar"></div>
  <div class="corner-tl"></div>
  <div class="corner-br"></div>

  <div class="content">
    <div class="logo">
      <span class="logo-tidal">tidal</span>
      <span class="logo-posting">posting</span>
    </div>
    <div class="divider"></div>
    <p class="coming-soon">Coming Soon</p>
    <p class="tagline">Find your tide.</p>
    <p class="email">In the meantime — <a href="mailto:jazmine@tidalposting.com">jazmine@tidalposting.com</a></p>
  </div>
</body>
</html>
